name: Apply responsive stylesheet

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-responsive-fix.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Connect responsive stylesheet
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          link = '  <link rel="stylesheet" href="responsive-fix.css?v=20260714" />'
          if 'responsive-fix.css' not in text:
              text = text.replace('</head>', f'{link}\n</head>')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit page update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Connect responsive hardening layer"
          git push
